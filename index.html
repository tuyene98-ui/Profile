<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Developer Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
        }

        *:focus, *:active {
            outline: none !important;
        }

        :root {
            --diamond: #00f3ff;
            --purple: #b829dd;
            --pink: #ff2d95;
            --gold: #ffd700;
            --dark: #0a0a0f;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Gradient Background */
        .bg {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(184, 41, 221, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 45, 149, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 243, 255, 0.05) 0%, transparent 70%),
                linear-gradient(180deg, #0a0a0f 0%, #1a0a1a 50%, #0a0a0f 100%);
        }

        /* Floating Orbs */
        .orbs {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 { width: 400px; height: 400px; background: var(--purple); top: -10%; left: -10%; animation-delay: 0s; }
        .orb-2 { width: 300px; height: 300px; background: var(--pink); bottom: -5%; right: -5%; animation-delay: -5s; }
        .orb-3 { width: 200px; height: 200px; background: var(--diamond); top: 40%; left: 60%; animation-delay: -10s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* Container */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* Card - Glassmorphism */
        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 3rem 2rem;
            margin-top: 1rem;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 30px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* Profile Image */
        .profile-wrap {
            text-align: center;
            margin-bottom: 2rem;
        }

        .avatar {
            position: relative;
            display: inline-block;
            padding: 4px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--diamond), var(--purple), var(--pink));
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .avatar-inner {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            animation: rotate 4s linear infinite reverse;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .crown {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5rem;
            z-index: 10;
            filter: drop-shadow(0 0 20px var(--gold));
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        /* Upload */
        .upload {
            text-align: center;
            margin: 1.5rem 0;
        }

        .upload-btn {
            background: linear-gradient(135deg, rgba(184, 41, 221, 0.3), rgba(255, 45, 149, 0.3));
            padding: 1rem 2rem;
            border-radius: 50px;
            color: #fff;
            font-family: 'VT323', monospace;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, rgba(184, 41, 221, 0.5), rgba(255, 45, 149, 0.5));
        }

        .upload-btn:active {
            transform: scale(0.98);
        }

        /* Content */
        .content {
            text-align: center;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(184, 41, 221, 0.2), rgba(255, 45, 149, 0.2));
            padding: 0.4rem 1.5rem;
            border-radius: 50px;
            font-family: 'VT323', monospace;
            font-size: 1rem;
            color: var(--pink);
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        h1 {
            font-family: 'VT323', monospace;
            font-size: 3.5rem;
            background: linear-gradient(135deg, #fff, var(--diamond));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 40px rgba(0, 243, 255, 0.3);
        }

        .subtitle {
            font-family: 'VT323', monospace;
            font-size: 1.3rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 2rem;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin: 2rem 0;
        }

        .stat {
            background: rgba(255,255,255,0.03);
            padding: 1.5rem 1rem;
            border-radius: 20px;
            transition: all 0.3s;
        }

        .stat:hover {
            background: rgba(255,255,255,0.06);
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-family: 'VT323', monospace;
            font-size: 2rem;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .stat-label {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
            margin-top: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Skills */
        .skills {
            margin: 2rem 0;
        }

        .section-title {
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 1rem;
        }

        .skill-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
        }

        .skill {
            background: rgba(255,255,255,0.05);
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
            cursor: pointer;
        }

        .skill:hover {
            background: rgba(0, 243, 255, 0.1);
            transform: scale(1.05);
        }

        .skill span:first-child {
            font-size: 1.2rem;
        }

        .skill span:last-child {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.8);
        }

        /* XP Bar */
        .xp {
            margin: 2rem 0;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .xp-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-family: 'VT323', monospace;
            font-size: 1rem;
            color: rgba(255,255,255,0.5);
        }

        .xp-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .xp-fill {
            height: 100%;
            width: 87%;
            background: linear-gradient(90deg, var(--purple), var(--pink));
            border-radius: 4px;
            box-shadow: 0 0 20px var(--pink);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Social */
        .social {
            margin-top: 2rem;
        }

        .social-grid {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: all 0.3s;
            text-decoration: none;
        }

        .social-btn:hover {
            background: rgba(0, 243, 255, 0.2);
            transform: translateY(-3px) rotate(5deg);
        }

        /* Achievement */
        .achievement {
            position: fixed;
            bottom: -100px;
            right: 20px;
            background: rgba(10, 10, 15, 0.95);
            padding: 1rem 1.5rem;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.5s;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .achievement.show {
            bottom: 20px;
        }

        .achievement-icon {
            font-size: 2rem;
        }

        .achievement-text h4 {
            color: var(--gold);
            font-family: 'VT323', monospace;
            font-size: 1.1rem;
        }

        .achievement-text p {
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            .avatar-inner { width: 150px; height: 150px; }
            .card { padding: 2rem 1rem; }
        }

        /* Particles */
        .particles {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--diamond);
            border-radius: 50%;
            opacity: 0.5;
            animation: particle 15s infinite;
        }

        @keyframes particle {
            0% { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    
    <div class="orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="card">
            <div class="profile-wrap">
                <div class="avatar">
                    <div class="crown">👑</div>
                    <div class="avatar-inner">
                        <img src="profile.jpg" id="profileImg" alt="Profile" onerror="this.style.display='none'; document.getElementById('placeholder').style.display='flex';">
                        <div id="placeholder" style="display: none; width: 100%; height: 100%; background: linear-gradient(135deg, var(--purple), var(--pink)); align-items: center; justify-content: center; font-size: 3rem;">
                            🎮
                        </div>
                    </div>
                </div>
            </div>

            <div class="upload">
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
                <div class="upload-btn" onclick="document.getElementById('fileInput').click()">
                    📷 Chọn ảnh
                </div>
            </div>

            <div class="content">
                <div class="badge">✦ PYTHON DEV ✦</div>
                <h1>WARPED_KING</h1>
                <p class="subtitle">Full Stack Developer</p>

                <div class="stats">
                    <div class="stat">
                        <div class="stat-icon">💎</div>
                        <div class="stat-value">999+</div>
                        <div class="stat-label">Diamonds</div>
                    </div>
                    <div class="stat">
                        <div class="stat-icon">⚔️</div>
                        <div class="stat-value">99</div>
                        <div class="stat-label">Level</div>
                    </div>
                    <div class="stat">
                        <div class="stat-icon">🏆</div>
                        <div class="stat-value">50+</div>
                        <div class="stat-label">Projects</div>
                    </div>
                    <div class="stat">
                        <div class="stat-icon">☕</div>
                        <div class="stat-value">∞</div>
                        <div class="stat-label">Coffee</div>
                    </div>
                </div>

                <div class="skills">
                    <div class="section-title">Tech Stack</div>
                    <div class="skill-grid">
                        <div class="skill"><span>🐍</span><span>Python</span></div>
                        <div class="skill"><span>⚡</span><span>FastAPI</span></div>
                        <div class="skill"><span>🎯</span><span>Django</span></div>
                        <div class="skill"><span>🐳</span><span>Docker</span></div>
                        <div class="skill"><span>☁️</span><span>AWS</span></div>
                        <div class="skill"><span>🐘</span><span>PostgreSQL</span></div>
                        <div class="skill"><span>📦</span><span>Git</span></div>
                        <div class="skill"><span>🔴</span><span>Redis</span></div>
                    </div>
                </div>

                <div class="xp">
                    <div class="xp-header">
                        <span>Experience</span>
                        <span>87%</span>
                    </div>
                    <div class="xp-bar">
                        <div class="xp-fill"></div>
                    </div>
                </div>

                <div class="social">
                    <div class="section-title">Connect</div>
                    <div class="social-grid">
                        <a href="#" class="social-btn">🐙</a>
                        <a href="#" class="social-btn">💬</a>
                        <a href="#" class="social-btn">🐦</a>
                        <a href="#" class="social-btn">✉️</a>
                        <a href="#" class="social-btn">💼</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="achievement" id="achievement">
        <div class="achievement-icon">🏆</div>
        <div class="achievement-text">
            <h4>Achievement Unlocked!</h4>
            <p>Profile Visited</p>
        </div>
    </div>

    <script>
        // Particles
        const particles = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 15 + 's';
            p.style.animationDuration = (10 + Math.random() * 10) + 's';
            particles.appendChild(p);
        }

        // Achievement
        setTimeout(() => {
            document.getElementById('achievement').classList.add('show');
            setTimeout(() => document.getElementById('achievement').classList.remove('show'), 3000);
        }, 1000);

        // Upload
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = document.getElementById('profileImg');
                    img.src = event.target.result;
                    img.style.display = 'block';
                    document.getElementById('placeholder').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
